<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Nike</title>
</head>
<body>
    <header class="header">
        <nav>
            <div class="header-img">
                <a href="#" id="menuButton">
                    <img id="menu" src="assets/menu.png" alt="menu-burger">
                </a>
            </div>
            <div class="header-img">
                <a href="#">
                    <img id="swoosh" src="assets/red-swoosh.png" alt="nike logo">
                </a>
            </div>
            <div class="header-img">
                <a href="#">
                    <img id="cart" src="assets/cart.png" alt="cart-logo">
                </a>
            </div>
        </nav>
    </header>

    <div id="sidePanel" class="side-panel">
        <button id="closePanel">
            <img id="closeimg" src="assets/icone-x-rouge-removebg-preview.svg" alt="close panel">
        </button>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Shop</a></li>
            <li><a href="#">About</a></li>
        </ul>
    </div>

    <main>
        <hero>
            <img class="lebron" src="assets/lebroneditimage2.jpg" alt="Lebron image">
        </hero>

        <section class="front-catalog">
            <div class="item">
                <img class="shoes" src="assets/nike-lebron-20-all-star.jpg" alt="shoe 1">
                <div class="item-desc-organizer">
                    <p class="item-name">Lebron 20 / All Star</p>
                    <img class="arrow" id="alls" src="assets/pngtree-right-pointing-arrow-icon-design-png-image_4457073-removebg-preview.jpg" alt="arrow">
                </div>
            </div>
            <div class="item">
                <img class="shoes" src="assets/lebron=promise.jpg" alt="shoe 2">
                <div class="item-desc-organizer">
                    <p class="item-name">Lebron 22 / Promise</p>
                    <img class="arrow" src="assets/pngtree-right-pointing-arrow-icon-design-png-image_4457073-removebg-preview.jpg" alt="arrow">
                </div>
            </div>
            <div class="item">
                <img class="shoes" id="dust" src="assets/lebrondust.jpg" alt="shoe 3">
                <div class="item-desc-organizer">
                    <p class="item-name">Lebron 21 / Dust Gold</p>
                    <img class="arrow" src="assets/pngtree-right-pointing-arrow-icon-design-png-image_4457073-removebg-preview.jpg" alt="arrow">
                </div>
            </div>
        </section>
        
    </main>

    <script>
         document.addEventListener('DOMContentLoaded', () => {
        const header = document.querySelector('.header');
        header.classList.add('animate-header');

        const observeItems = (selector, animationClass) => {
            const elements = document.querySelectorAll(selector);
            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add(animationClass);
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1 });
            elements.forEach(el => observer.observe(el));
        };
        observeItems('.item', 'animate-item');
        observeItems('.lebron', 'animate-lebron');

        const menuButton = document.getElementById('menuButton');
        const sidePanel = document.getElementById('sidePanel');
        const closePanel = document.getElementById('closePanel');
        menuButton.addEventListener('click', e => {
            sidePanel.style.transform = 'translateX(0)';
            e.preventDefault(); // Prevent scrolling to top
            e.stopPropagation(); // Stop event propagation
        });
        closePanel.addEventListener('click', () => {
            sidePanel.style.transform = 'translateX(-100%)';
        });
        document.addEventListener('click', e => {
            if (!sidePanel.contains(e.target) && e.target !== menuButton) {
                sidePanel.style.transform = 'translateX(-100%)';
            }
        });
    });
    </script>
</body>
</html>
