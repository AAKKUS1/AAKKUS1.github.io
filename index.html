<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Nike</title>
</head>
<body>
    <header class="header">
        <nav>
            <div class="header-img">
                <a href="#" id="menuButton">
                    <img id="menu" src="assets/menu.png" alt="menu-burger">
                </a>
            </div>
            <div class="header-img">
                <a href="#">
                    <img id="swoosh" src="assets/red-swoosh.png" alt="nike logo">
                </a>
            </div>
            <div class="header-img">
                <a href="#">
                    <img id="cart" src="assets/cart.png" alt="cart-logo">
                </a>
            </div>
        </nav>
    </header>

    <div id="sidePanel" class="side-panel">
        <button id="closePanel"><img id="closeimg" src="assets/icone-x-rouge-removebg-preview.png"></button>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Shop</a></li>
            <li><a href="#">About</a></li>
        </ul>
    </div>

    <main>
        <hero>
            <div class="audio-player">
                <audio id="audioPlayer" autoplay>
                    <source src="assets/KanyeWest-Runaway.mp3" type="audio/mpeg">
                </audio>
                <div class="controls">
                    <button id="muteButton">
                        <img src="assets/istockphoto-1305893663-612x612-removebg-preview.png">
                    </button>
                </div>
            </div>
            <img class="lebron" src="assets/lebroneditimage2.png">
        </hero>

        <section class="front-catalog">
            <div class="item">
                <img class="shoes" src="assets/nike-lebron-20-all-star.png">
                <div class="item-desc-organizer">
                    <p class="item-name">Lebron 20 / All Star</p>
                    <img class="arrow" id="alls" src="assets/pngtree-right-pointing-arrow-icon-design-png-image_4457073-removebg-preview.png">
                </div>
            </div>

            <div class="item">
                <img class="shoes" src="assets/lebron=promise.png">
                <div class="item-desc-organizer">
                    <p class="item-name">Lebron 22 / Promise</p>
                    <img class="arrow" src="assets/pngtree-right-pointing-arrow-icon-design-png-image_4457073-removebg-preview.png">
                </div>
            </div>

            <div class="item">
                <img class="shoes" id="dust" src="assets/lebrondust.png">
                <div class="item-desc-organizer">
                    <p class="item-name">Lebron 21 / Dust Gold</p>
                    <img class="arrow" src="assets/pngtree-right-pointing-arrow-icon-design-png-image_4457073-removebg-preview.png">
                </div>
            </div>
        </section>
    </main>

    <script>
        window.onload = () => {
            document.querySelector('.header').classList.add('animate-header');
        };

        document.addEventListener("DOMContentLoaded", () => {
            const items = document.querySelectorAll(".item");
            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add("animate-item");
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1 });

            items.forEach(item => observer.observe(item));
        });

        document.addEventListener("DOMContentLoaded", () => {
            const lebronImage = document.querySelector(".lebron");
            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add("animate-lebron");
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1 });

            observer.observe(lebronImage);
        });
        const iframe = document.getElementById('audioIframe');
        const muteButton = document.getElementById('muteButton');

        
        let audioVolume = 0.5;

       
        muteButton.addEventListener('click', () => {
            if (iframe.src.includes('mute=1')) {
                iframe.src = iframe.src.replace('mute=1', 'mute=0');
                muteButton.classList.remove('active');
            } else {
                iframe.src = iframe.src.replace('mute=0', 'mute=1');
                muteButton.classList.add('active');
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            const audioPlayer = document.getElementById('audioPlayer');
            const muteButton = document.getElementById('muteButton');
            muteButton.addEventListener('click', () => {
                audioPlayer.muted = !audioPlayer.muted;
                muteButton.classList.toggle('active')});
        });
        
        document.addEventListener('DOMContentLoaded', () => {
    const menuButton = document.getElementById('menuButton');
    const sidePanel = document.getElementById('sidePanel');
    const closePanel = document.getElementById('closePanel');

   
    menuButton.addEventListener('click', (e) => {
        sidePanel.style.transform = 'translateX(0)';
        e.stopPropagation(); 
    });

    
    const audioPlayer = document.getElementById('audioPlayer');
    const muteButton = document.getElementById('muteButton');

    muteButton.addEventListener('click', () => {
        audioPlayer.muted = !audioPlayer.muted;
        muteButton.classList.toggle('active');
    });
});


    </script>
</body>
</html>
